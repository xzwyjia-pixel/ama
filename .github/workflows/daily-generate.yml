name: Daily Content Generation
# 每天北京时间 8:30 = UTC 00:30
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate content via DeepSeek
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # 生成三条内容, POST到Vercel API
          for direction in content service report; do
            curl -s -X POST https://agent-business-xi.vercel.app/api/generate \
              -H "Content-Type: application/json" \
              -d "{\"direction\":\"$direction\",\"mode\":\"gzh\"}"
          done
          echo "Daily generation complete"
